services:
  central-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rpst_dw}
      POSTGRES_USER: ${POSTGRES_USER:-rpst}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rpst_change_me}
    volumes:
      - central_db_data:/var/lib/postgresql/data
      - ./central-db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./central-db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  central-api:
    build: ./central-api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-rpst}:${POSTGRES_PASSWORD:-rpst_change_me}@central-db:5432/${POSTGRES_DB:-rpst_dw}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret}
      JWT_ISSUER: ${JWT_ISSUER:-rpst-etl}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-rpst-central-api}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    expose:
      - "8080"
    depends_on:
      central-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build: ./dashboard
    expose:
      - "80"
    depends_on:
      - central-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl-agent-sample:
    profiles: ["etl-sample"]
    build: ./etl-agent
    environment:
      FACILITY_ID: "10001"
      FACILITY_NAME: "รพ.สต. ตัวอย่าง"
      CENTRAL_API_URL: http://central-api:8080/api/v1/etl/summary
      JWT_SECRET: change_this_to_a_long_random_secret
      JWT_ISSUER: rpst-etl
      JWT_AUDIENCE: rpst-central-api
      LOCAL_DB_KIND: sqlite
      LOCAL_DB_DSN: /app/sample_hosp.sqlite
    depends_on:
      - central-api

volumes:
  central_db_data:
