services:
  database:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-ub_amms}
      MARIADB_USER: ${MARIADB_USER:-ub_amms}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?Set MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DATABASE_URL: mysql+pymysql://${MARIADB_USER:-ub_amms}:${MARIADB_PASSWORD}@database:3306/${MARIADB_DATABASE:-ub_amms}?charset=utf8mb4
      CORS_ORIGINS: ${CORS_ORIGINS:-https://amms.example.go.th}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?Set INITIAL_ADMIN_PASSWORD}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.local}
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    depends_on:
      database:
        condition: service_healthy
    networks: [internal]

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on: [backend]
    networks: [internal]

networks:
  internal:

volumes:
  mariadb_data:
  uploads:
  backups:
