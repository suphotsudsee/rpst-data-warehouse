services:
  central-db:
    image: postgres:16-alpine
    container_name: rpst-central-db
    environment:
      POSTGRES_DB: rpst_dw
      POSTGRES_USER: rpst
      POSTGRES_PASSWORD: rpst_change_me
    ports:
      - "5432:5432"
    volumes:
      - central_db_data:/var/lib/postgresql/data
      - ./central-db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./central-db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpst -d rpst_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

  central-api:
    build: ./central-api
    container_name: rpst-central-api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://rpst:rpst_change_me@central-db:5432/rpst_dw
      JWT_SECRET: change_this_to_a_long_random_secret
      JWT_ISSUER: rpst-etl
      JWT_AUDIENCE: rpst-central-api
      CORS_ORIGIN: http://localhost:8088
    ports:
      - "8080:8080"
    depends_on:
      central-db:
        condition: service_healthy

  dashboard:
    image: nginx:1.27-alpine
    container_name: rpst-dashboard
    ports:
      - "8088:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - central-api

  etl-agent-sample:
    profiles: ["etl-sample"]
    build: ./etl-agent
    container_name: rpst-etl-agent-sample
    environment:
      FACILITY_ID: "10001"
      FACILITY_NAME: "รพ.สต. ตัวอย่าง"
      CENTRAL_API_URL: http://central-api:8080/api/v1/etl/summary
      JWT_SECRET: change_this_to_a_long_random_secret
      JWT_ISSUER: rpst-etl
      JWT_AUDIENCE: rpst-central-api
      LOCAL_DB_KIND: sqlite
      LOCAL_DB_DSN: /app/sample_hosp.sqlite
    depends_on:
      - central-api

volumes:
  central_db_data:
